<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Senior Project — mazzola.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/profile.jpg" type="image/jpeg" />
</head>
<body>

<canvas id="starfield"></canvas>

<div class="wrapper">

  <!-- NAV -->
  <nav class="site-nav">
    <a href="/" class="nav-brand">mazzola.dev</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/blog.html" class="active">Blog</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="blog-index-hero reveal">
    <h1>Mission <em style="color:var(--gold); font-style:italic;">Log</em></h1>
    <p>Weekly dispatches from my senior project where I teach spacecraft to think with deep reinforcement learning.</p>
  </section>

  <div class="divider"></div>

  <!-- BLOG LIST — populated by JS -->
  <div id="blog-list">
    <div class="blog-loading">
      <span class="spinner"></span> Scanning for transmissions&hellip;
    </div>
  </div>

</div><!-- /wrapper -->

<!-- STAR FIELD SCRIPT -->
<script>
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
  }

  function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 5000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.3 + .2,
        a: Math.random(),
        speed: Math.random() * .003 + .001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame++;
    stars.forEach(s => {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(frame * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 200, 255, ${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  function init() { resize(); initStars(); draw(); }
  window.addEventListener('resize', () => { resize(); initStars(); });
  window.addEventListener('load', init);
  init();
})();
</script>

<!-- SCROLL REVEAL SCRIPT -->
<script>
(function() {
  const revealEls = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -40px 0px' });
  revealEls.forEach(el => io.observe(el));
})();
</script>

<!-- AUTO-DISCOVER BLOG POSTS -->
<script>
(async function() {
  const container = document.getElementById('blog-list');
  const blogs = [];

  // Probe for blog1.html, blog2.html, blog3.html, etc.
  // Stops when it hits a 404 (gap-less numbering assumed).
  let n = 1;
  while (true) {
    const url = `/blog_${n}.html`;
    try {
      const res = await fetch(url, { method: 'GET' });
      if (!res.ok) break;

      const html = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // Extract metadata from <meta> tags first, fall back to DOM elements
      const title = getMeta(doc, 'blog-title')
        || doc.querySelector('.hero-title')?.textContent?.trim()
        || `Blog ${n}`;
      const date = getMeta(doc, 'blog-date') || '';
      const week = getMeta(doc, 'blog-week') || `Week ${n}`;
      const description = getMeta(doc, 'blog-description')
        || doc.querySelector('.hero-sub')?.textContent?.trim()
        || '';

      blogs.push({ n, url, title, date, week, description });
      n++;
    } catch (e) {
      break;
    }
  }

  // Render
  if (blogs.length === 0) {
    container.innerHTML = '<div class="blog-empty">No transmissions received yet. Check back soon.</div>';
    return;
  }

  // Show newest first
  blogs.reverse();

  const grid = document.createElement('div');
  grid.className = 'blog-grid';

  blogs.forEach((b, i) => {
    const card = document.createElement('a');
    card.href = b.url;
    card.className = 'blog-card reveal';

    card.innerHTML = `
      <div class="blog-card-eyebrow">${b.week} &nbsp;&middot;&nbsp; ${b.date}</div>
      <div class="blog-card-title">${b.title}</div>
      <div class="blog-card-desc">${b.description}</div>
      <span class="blog-card-arrow">Read Entry &rarr;</span>
    `;

    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);

  // Trigger reveal animation for dynamically added cards
  requestAnimationFrame(() => {
    grid.querySelectorAll('.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 120);
    });
  });

  // Resize starfield to account for new content
  window.dispatchEvent(new Event('resize'));

  function getMeta(doc, name) {
    const el = doc.querySelector(`meta[name="${name}"]`);
    return el ? el.getAttribute('content') : null;
  }
})();
</script>

</body>
</html>
